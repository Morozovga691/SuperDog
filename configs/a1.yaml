# A1 Robot Configuration
walking_policy_path: "data/walking_policy/model_4999.pt"
xml_path: "assets/unitree_a1/scene.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 10
# SAC policy update frequency (runs every N control cycles; 50Hz / sac_decimation = SAC frequency)
# Example: sac_decimation=5 → SAC runs at 10Hz (50Hz / 5 = 10Hz)
sac_decimation: 10
# Maximum steps per episode
max_steps: 10000

# A1 has 12 DOF (4 legs × 3 joints: abduction, hip, knee)
# PD gains from Isaac Lab UNITREE_A1_CFG: stiffness=20.0, damping=0.5
kps: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20]
kds: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

# Default angles for A1 (from Isaac Lab UNITREE_A1_CFG)
# Order: FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh, FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf
# Isaac Lab: hip=0.0, thigh=0.8, calf=-1.5
default_angles: [0, 0.8, -1.5, 0, 0.8, -1.5, 0, 0.8, -1.5, 0, 0.8, -1.5]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
# Different action scales for different joint types (from Isaac Lab):
# hip_joint: 0.125, other joints: 0.25
# Order: FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh, FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf
action_scales: [0.125, 0.25, 0.25, 0.125, 0.25, 0.25, 0.125, 0.25, 0.25, 0.125, 0.25, 0.25]
# Legacy single action_scale (for backward compatibility, but action_scales takes precedence)
action_scale: 0.25
cmd_scale: [1.0, 0.5, 0.35]
num_actions: 12  # Number of robot DOF for walking policy
# Observation dimension for walking policy based on PolicyCfg:
# base_lin_vel(3) + base_ang_vel(3) + projected_gravity(3) + velocity_commands(3) + 
# joint_pos(12) + joint_vel(12) + actions(12) + height_scan(N) = 48 + N
# For now, assuming height_scan is 56 (common in legged robots), total = 104
num_obs: 45  # Will be updated based on actual height_scan size

cmd_init: [0, 0, 0]

# Replay buffer configuration
replay_buffer:
  # Buffer capacity and initialization
  buffer_size: 1000000      # 1e6 - standard for SAC continuous control
  random_seed: 100          # Reproducibility (set to null for random)
  
  # Weighted sampling - prioritize important transitions
  success_weight: 1.0       # Sample success steps more often
  collision_weight: 1.0     # Sample collision steps more often to learn avoidance

# SAC Hyperparameters - OPTIMIZED FOR COLLISION AVOIDANCE
sac:
  # Observation history
  # Actor uses no history (faster decisions), Critic uses history (better value estimation)
  history_length: 3 # Actor history (0 = no history, fast reactive decisions)
  critic_history_length: 3  # Critic history (increased for better temporal awareness)  
  
  # Network architecture - BALANCED SIZE
  # Smaller networks train more slowly but generalize better
  actor:
    hidden_dim: [512, 512, 256]  # Slightly smaller for more stable gradients
    log_std_bounds: [-2, 2]      # CRITICAL FIX: prevents std collapse (was [-5, 2])
  
  critic:
    hidden_dim: [512, 512, 256]  # Same size, but with history and extra features
    # ADD extra lidar features to critic for better obstacle awareness
    critical_topk: 5  # Critic sees 5 nearest obstacles (48 + 5 = 53 dims)
  
  # Learning rates - HIGHER for faster adaptation
  # Key: actor learns faster to escape local minima
  actor_lr: 0.0001     # 10x higher - faster policy updates
  critic_lr: 0.0003    # Even higher - critic needs to learn fast
  alpha_lr:  0.0003    # Higher for adaptive entropy (increased from 0.0001)
  
  # Training hyperparameters - EXPLORATION FOCUSED
  discount: 0.99
  init_temperature: 0.2        # LOW for better exploration (learnable alpha protects from collapse)
  target_entropy: -1.5         # Higher entropy target for more exploration (was -3.0)
  critic_tau: 0.005
  actor_update_frequency: 1
  critic_target_update_frequency: 2
  learnable_temperature: true
  
  # Action space
  max_action: 1.0
  
  # Optimizer settings - STANDARD
  actor_betas: [0.9, 0.999]
  critic_betas: [0.9, 0.999]
  alpha_betas: [0.9, 0.999]    # Standard (was [0.5, 0.999]) - more stable
  
  # Training schedule - CONSERVATIVE (avoid overfitting)
  train_every_n: 1              # Train more frequently (was 2)
  training_iterations: 4        # MUCH SMALLER - avoid overfit (was 500!)
  batch_size: 512               # SMALLER - more stable (was 1024)
  min_buffer_size: 5000         # Larger buffer before training starts         

# Reward weights - COLLISION AVOIDANCE FOCUSED
reward_weights:
  # Terminal rewards - ASYMMETRIC (collision much worse than success)
  reached: 100.0                    
  collision: -500.0                 # MUCH HIGHER penalty (was -100)
  
  # Obstacle avoidance - CRITICAL
  obs_penalty_weight: 5.0           # MUCH HIGHER (was 1.0) - strong fear of obstacles
  obstacle_threshold: 1.5           # Start penalty earlier (was 1.3)
  obstacle_exponential_scale: 5.0   # Stronger exponential growth (was 4.0)
  
  # Thresholds
  reached_threshold: 0.2
  collision_threshold: 0.35
  
  # Progress and movement - ENCOURAGE FORWARD MOVEMENT
  progress: 20.0                    # Higher reward for progress (was 15.0)
  time_penalty: -0.02               # Lower time penalty (was -0.08) - don't rush
  
  # Penalties - DISCOURAGE BAD BEHAVIOR
  vy_penalty: -1                  # Reduced - allow some lateral movement
  vx_backward_penalty: -1.0         # HIGHER - strongly discourage backward (was -0.5)
  w_penalty_weight: 0.0               # TEMPORARILY DISABLED: angular velocity penalty disabled for training experiment
  
  # Alignment - STRAIGHTNESS (for fine-tuning)
  velocity_alignment: 0.5           # Reward for moving "face forward" (0.0 = disabled)
  velocity_alignment_threshold: 0.1 # Minimum velocity to apply alignment reward (m/s)

# LiDAR configuration
lidar:
  noise_std: 0.02  # Standard deviation of Gaussian noise in meters (e.g. 0.02 = 2cm)
  offset_x: 0.12   # Distance from robot center to lidar (m) - for transform to center frame
  offset_y: 0.0    # Lateral offset (m), typically 0

# Observation noise (sim-to-real, applied only to Actor during training; Critic gets clean data)
observation_noise:
  distance_std: 0.05      # Std of Gaussian noise for distance to target (m)
  angle_std: 0.05         # Std for direction to target (rad, ~3 deg)
  angular_vel_std: 0.02   # Std for angular velocity (rad/s)
  lidar_std: 0.02         # Std for lidar (m), same as lidar.noise_std

# Obstacle generator - progressive difficulty
obstacle_generator:
  regeneration_interval: 2
  
  cubes:
    count_min: 7              # Start with fewer obstacles
    count_max: 9              # Moderate maximum
    size_x_min: 0.15
    size_x_max: 0.35
    size_y_min: 0.15
    size_y_max: 0.35
    size_z: 1.0
  
  position:
    min_margin: 1           # Larger spawn margin for easier start
  
  spawn:
    clearance: 0.7          # Spawn clearance from obstacles (robot radius ~0.25m + collision_threshold 0.3m + margin)
    grid_step: 0.1          # Grid step for free space generation
